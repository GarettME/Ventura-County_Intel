# ─────────────────────────────────────────────────────────────────────────────
# Ventura County Motivated Seller Lead Scraper — GitHub Actions Workflow
#
# Schedule : Every day at 07:00 UTC (11 PM PST / midnight PDT)
# Manual   : Actions tab → "Run workflow" (with optional debug flag)
#
# Outputs
#   data/records.json       — raw lead data
#   data/ghl_export.csv     — GoHighLevel import CSV
#   dashboard/records.json  — copy for GitHub Pages dashboard
#
# GitHub Pages is served from the /dashboard folder on the gh-pages branch.
# Enable it in: Settings → Pages → Source: Deploy from branch → gh-pages → /root
# ─────────────────────────────────────────────────────────────────────────────

name: Scrape Ventura County Leads

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily

  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Enable verbose logging (set DEBUG=true)"
        required: false
        default: "false"
        type: boolean
      lookback_days:
        description: "Days to look back (default 7)"
        required: false
        default: "7"
        type: string

jobs:
  scrape:
    name: Run Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write      # needed to commit results + deploy pages
      pages: write
      id-token: write

    env:
      PYTHONPATH: ${{ github.workspace }}/scraper
      DEBUG: ${{ github.event.inputs.debug_mode || 'false' }}
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
      REPORTALL_API_KEY: ${{ secrets.REPORTALL_API_KEY }}   # optional: enables address enrichment
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 deprecation warning

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # ── 3. Python dependencies ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # ── 4. Playwright browser ───────────────────────────────────────────────
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      # ── 5. Create output dirs ───────────────────────────────────────────────
      - name: Create output directories
        run: mkdir -p data dashboard

      # ── 6. Run scraper ──────────────────────────────────────────────────────
      - name: Run scraper
        run: python scraper/fetch.py

      # ── 7. Validate output ──────────────────────────────────────────────────
      - name: Validate JSON output
        run: |
          python -c "
          import json, sys
          with open('data/records.json') as f:
              data = json.load(f)
          total = data.get('total', 0)
          with_addr = data.get('with_address', 0)
          print(f'✅  records.json valid — {total} records, {with_addr} with address')
          records = data.get('records', [])
          if records:
              top = records[0]
              print(f'   Top lead: {top[\"owner\"]} (score={top[\"score\"]})')
          "

      # ── 8. Upload JSON artifact ─────────────────────────────────────────────
      - name: Upload JSON artifact
        uses: actions/upload-artifact@v7
        with:
          name: leads-json-${{ github.run_number }}
          path: data/records.json
          retention-days: 90

      # ── 9. Upload GHL CSV artifact ──────────────────────────────────────────
      - name: Upload GHL CSV artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghl-csv-${{ github.run_number }}
          path: data/ghl_export.csv
          retention-days: 90

      # ── 10. Commit results back to repo ─────────────────────────────────────
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/records.json data/ghl_export.csv dashboard/records.json
          git diff --cached --quiet || \
            git commit -m "chore: update leads [$(date -u '+%Y-%m-%d %H:%M UTC')] — ${{ github.run_number }} records"
          git push

      # ── 11. Deploy dashboard to GitHub Pages ────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard/

      - name: Deploy Pages
        uses: actions/deploy-pages@v5

      # ── 12. Job summary ─────────────────────────────────────────────────────
      - name: Print run summary
        if: always()
        run: |
          python -c "
          import json, os
          summary = os.getenv('GITHUB_STEP_SUMMARY', '')
          try:
              with open('data/records.json') as f:
                  data = json.load(f)
              records = data.get('records', [])
              high = [r for r in records if r['score'] >= 70]
              med  = [r for r in records if 40 <= r['score'] < 70]
              low  = [r for r in records if r['score'] < 40]
              lines = [
                  '## Ventura County Leads Scraper Results',
                  '',
                  '| Metric | Value |',
                  '|--------|-------|',
                  f'| Total records | {len(records)} |',
                  f'| High score (≥70) | {len(high)} |',
                  f'| Medium score (40-69) | {len(med)} |',
                  f'| Low score (<40) | {len(low)} |',
                  f'| With address | {data.get(\"with_address\", 0)} |',
                  f'| Generated at | {data.get(\"fetched_at\", \"unknown\")} |',
              ]
              print('\n'.join(lines))
              if summary:
                  with open(summary, 'a') as sf:
                      sf.write('\n'.join(lines) + '\n')
          except Exception as e:
              msg = f'| Error reading results | {e} |'
              print(msg)
              if summary:
                  with open(summary, 'a') as sf:
                      sf.write(msg + '\n')
          "
